name: Deploy Example to GitHub Pages

on:
  workflow_call:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # check out repo
    - uses: actions/checkout@v6
    
    # Setup Pages
    - name: Setup Pages
      uses: actions/configure-pages@v6
      
    # install dependencies and generate documentation
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: install_deps
      run: |
        pip install pipenv
        pipenv install
        
    # run stella to generate documentation
    - name: create_output_dir
      run: mkdir -p _site

    - name: generate_docs
      run: pipenv run python stella.py -fh -ah -hcp EXAMPLE/prometheus -o ./_site/index.html

    - name: verify_output
      run: |
        echo "Contents of _site:"
        ls -la _site/
        test -s _site/index.html || (echo "ERROR: index.html is missing or empty" && exit 1)

    # Upload artifact for Pages
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        name: pages-artifact
        path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: pages-artifact
